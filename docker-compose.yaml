services:
  api:
    build: .
    container_name: molt-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on: 
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    container_name: db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d moltbook"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data: